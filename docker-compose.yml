services:
  db:
    image: postgres:16
    container_name: endosys_db
    environment:
      POSTGRES_DB: endosys
      POSTGRES_USER: endosys
      POSTGRES_PASSWORD: endosys
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: endosys_backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+psycopg://endosys:endosys@db:5432/endosys
      FLASK_APP: app
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 5000
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend/endometriose-sys
      dockerfile: Dockerfile
    container_name: endosys_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  pgdata: